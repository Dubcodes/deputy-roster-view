services:
  deputy-roster-view:
    build: .
    ports:
      - "${APP_PORT:-8096}:8000"
    volumes:
      - ./data:/app/data
    environment:
      - TZ=${TZ:-Pacific/Auckland}
      - DEPUTY_ICAL_URL=${DEPUTY_ICAL_URL:-}
      - DEPUTY_WEB_URL=${DEPUTY_WEB_URL:-https://bb12c621103108.au.deputy.com/#/}
      - DEPUTY_LOGIN_EMAIL=${DEPUTY_LOGIN_EMAIL:-}
      - DEPUTY_LOGIN_PASSWORD=${DEPUTY_LOGIN_PASSWORD:-}
      - DEPUTY_DISPLAY_NAME=${DEPUTY_DISPLAY_NAME:-}
      - DEPUTY_API_TOKEN=${DEPUTY_API_TOKEN:-}
      - APP_SECRET_KEY=${APP_SECRET_KEY:-}
      - TRUSTED_DEVICE_DAYS=${TRUSTED_DEVICE_DAYS:-730}
      - SIGNUP_ENABLED=${SIGNUP_ENABLED:-true}
      - COOKIE_SECURE=${COOKIE_SECURE:-false}
      - SYNC_AT_HOUR=${SYNC_AT_HOUR:-5}
      - EARLY_PRE_SHIFT_SYNC_HOURS=${EARLY_PRE_SHIFT_SYNC_HOURS:-12}
      - PRE_SHIFT_SYNC_MINUTES=${PRE_SHIFT_SYNC_MINUTES:-60}
      - CHANGED_FOLLOWUP_SYNC_MINUTES=${CHANGED_FOLLOWUP_SYNC_MINUTES:-30}
      - USER_SYNC_STAGGER_MINUTES=${USER_SYNC_STAGGER_MINUTES:-7}
      - USER_SYNC_JITTER_MINUTES=${USER_SYNC_JITTER_MINUTES:-2}
      - USER_SYNC_BATCH_SIZE=${USER_SYNC_BATCH_SIZE:-1}
      - OWN_ROSTER_LOOKBACK_DAYS=${OWN_ROSTER_LOOKBACK_DAYS:-35}
      - OWN_ROSTER_LOOKAHEAD_DAYS=${OWN_ROSTER_LOOKAHEAD_DAYS:-56}
    restart: unless-stopped
