{% macro holiday_marker(holiday) -%}
  {% if holiday and holiday.is_public_holiday %}
    <details class="holiday-marker">
      <summary aria-label="{{ holiday.aria_label }}" title="{{ holiday.name }}">★</summary>
      <span class="holiday-popover" role="status">{% for name in holiday.names %}<span>{{ name }}</span>{% endfor %}</span>
    </details>
  {% endif %}
{%- endmacro %}
